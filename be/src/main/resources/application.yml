spring:
  application:
    name: sell-glass-be
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900
  refresh-token-expiry: 604800

server:
  port: 8080

logging:
  level:
    com.sellglass: INFO

app:
  frontend-url: ${FRONTEND_URL}
  mail-from: ${MAIL_FROM}

cloudinary:
  url: ${CLOUDINARY_URL}

casso:
  secure-token: ${CASSO_SECURE_TOKEN}
